<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPower Core | Enterprise Dashboard</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js" defer></script>

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                <h1>SmartPower <span>Core</span></h1>
            </div>
            <div class="system-status" id="systemStatus" role="status" aria-live="polite">
                <span class="status-indicator"></span>
                <span class="status-text">Łączenie...</span>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="panel control-panel" aria-labelledby="control-heading">
                <h2 id="control-heading" class="sr-only">Panel Sterowania</h2>

                <div class="metric-card primary-metric">
                    <span class="metric-label">Temperatura CPU</span>
                    <div class="metric-value-wrapper">
                        <span class="metric-value" id="currentTemp">--</span>
                        <span class="metric-unit">°C</span>
                    </div>
                </div>

                <div class="metric-card">
                    <span class="metric-label">Aktywny Profil</span>
                    <div class="status-badge" id="currentMode">ANALIZA</div>
                </div>

                <div class="control-group">
                    <label for="inputHysteresis" class="metric-label">Histereza termiczna (°C)</label>
                    <div class="input-wrapper">
                        <input type="number" id="inputHysteresis" step="0.5" min="0" max="15" aria-describedby="hysteresis-help">
                        <div class="input-focus-border"></div>
                    </div>
                    <span id="hysteresis-help" class="help-text">Zapobiega niestabilnemu przełączaniu trybów.</span>
                </div>

                <div class="info-alert">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <p>Dostosuj progi <strong>Turbo</strong> i <strong>Silent</strong> przeciągając przerywane linie na wykresie po prawej stronie.</p>
                </div>
            </section>

            <section class="panel chart-panel" aria-label="Wykres Temperatury">
                <div class="chart-header">
                    <h2>Wykres Telemetryczny na Żywo</h2>
                </div>
                <div class="chart-container">
                    <canvas id="tempChart" aria-label="Wykres liniowy temperatury procesora" role="img"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
