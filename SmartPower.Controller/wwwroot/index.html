<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPower Core</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js"></script>

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="topbar">
            <h1>SmartPower <span class="highlight">Core</span></h1>
            <div class="status-indicator">
                <span class="dot live"></span> System Online
            </div>
        </header>

        <main class="layout-grid">

            <aside class="sidebar card">
                <div class="metric-group">
                    <h2 class="metric-title">Temperatura CPU</h2>
                    <div class="temp-display" id="currentTemp">-- °C</div>
                </div>

                <div class="metric-group">
                    <h2 class="metric-title">Aktywny Profil Zasilania</h2>
                    <div class="mode-badge" id="currentMode">ŁADOWANIE...</div>
                </div>

                <div class="divider"></div>

                <div class="metric-group">
                    <h2 class="metric-title">Histereza (°C)</h2>
                    <p class="help-text">Zabezpieczenie przed skokami trybów</p>
                    <input type="number" id="inputHysteresis" step="0.5" min="0" max="15" title="Zmiana wartości automatycznie zapisuje się w systemie">
                </div>

                <div class="info-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    <p>Przeciągaj przerywane linie bezpośrednio na wykresie, aby płynnie dostosować limity Throttlingu.</p>
                </div>
            </aside>

            <section class="chart-section card">
                <canvas id="tempChart"></canvas>
            </section>

        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
